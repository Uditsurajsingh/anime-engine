generation_rules:
  visual_style: "minimal original nautical shonen anime"
  image_model: "Animagine XL 4.0"
  orientation: "vertical"
  width: 768
  height: 1344
  steps: 30
  cfg: 5.5
  sampler: "euler_ancestral"
  scheduler: "normal"
  batch_size: 1
  variants_per_shot: 4

quality_rules:
  accept_if:
    - "only Aro appears when character is present"
    - "Aro roughly matches captain_aro_v1 identity"
    - "the symbolic object is clear"
    - "background is simple"
    - "shot reads clearly on a phone screen"
  reject_if:
    - "multiple characters appear"
    - "Aro looks like a different character"
    - "scene is too busy"
    - "symbolic object is missing"
    - "image contains text, logo, watermark, or unreadable fake writing"