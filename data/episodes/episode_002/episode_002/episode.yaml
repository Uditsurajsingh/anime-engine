episode:
  episode_id: "episode_002"
  title: "The Empty Shell"
  format: "vertical philosophical anime short"
  duration_seconds: 35
  aspect_ratio: "9:16"
  resolution:
    width: 1080
    height: 1920

creative_intent:
  core_teaching: "Not everything empty is worthless. Some things become empty because life has already moved on."
  source_inspiration:
    type: "original philosophical retelling"
    inspired_by:
      - "Buddhist-style reflection on attachment"
      - "general spiritual teaching about letting go"
    copyright_rule: "Original wording only. Do not copy modern translations or copyrighted devotional text."
  emotional_arc:
    start: "Aro feels disappointed after finding an empty shell."
    middle: "He mistakes emptiness for uselessness."
    end: "He realises emptiness can mean something has completed its journey."

visual_motif:
  main_symbol: "empty sea shell"
  supporting_symbols:
    - "quiet beach"
    - "small wave"
    - "morning light"
    - "Aro's hand opening slowly"
  visual_complexity: "minimal"
  character_count_per_shot: 1

main_character:
  character_id: "captain_aro_v1"
  name: "Captain Aro"
  role_in_episode: "learner and observer"

narration:
  voice_style: "calm, reflective, simple"
  full_script: |
    Aro found a shell by the sea.
    It was beautiful, but empty.
    He almost threw it away.
    Then the tide touched his hand.
    And he understood.
    Some things are empty because they are broken.
    But some things are empty because life has already moved on.
    Aro closed his hand softly.
    Not every empty thing is useless.
    Some empty things are free.

dialogue:
  aro_lines:
    - timestamp: "00:00:08"
      line: "It's empty."
    - timestamp: "00:00:26"
      line: "Maybe... it already became something else."

